<!DOCTYPE html>
<html>
<head>
    <title>Even/Odd Checker</title>
</head>
<body>

    <h2>Even or Odd Checker</h2>
    
    <p id="result-display">Result will appear here.</p>

    <script>
        
        function checkEvenOdd(number) {
            let message = "";

            if (number % 2 === 0) {
                message = number + " Even Number";
            } else {
                message = number + " Odd Number ";
            }

            
            document.getElementById("result-display").innerText = message;
        }

        checkEvenOdd(15); 

    </script>
</body>
</html>
